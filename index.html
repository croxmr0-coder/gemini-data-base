<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUHTEREM PANEL | Unauthorized Access is Prohibited</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanline"></div>

    <div id="login-screen">
        <div class="terminal-box">
            <div class="glitch" data-text="MUHTEREM_PANEL_V1.0">MUHTEREM_PANEL_V1.0</div>
            <p class="status-text">KİMLİK DOĞRULAMA GEREKLİ...</p>
            <div class="input-wrapper">
                <span class="prompt">></span>
                <input type="password" id="pass-input" placeholder="ERİŞİM KODU..." autofocus>
            </div>
            <button onclick="checkAccess()" class="login-btn">SİSTEME SIZ</button>
            <p id="error-msg" class="error"></p>
        </div>
    </div>

    <div id="main-panel" style="display:none;">
        <header class="panel-header">
            <div class="user-info">
                <span id="welcome-text"></span>
                <span class="pulse-dot"></span>
            </div>
            <div class="system-time" id="clock">00:00:00</div>
        </header>

        <nav class="side-nav">
            <button class="nav-btn active" onclick="switchTab('photos')">FOTOĞRAFLAR</button>
            <button class="nav-btn" onclick="switchTab('videos')">VİDEOLAR</button>
            <button class="nav-btn" onclick="switchTab('notes')">NOTLAR</button>
            <button class="nav-btn upload-btn" onclick="openUpload()">DOSYA YÜKLE +</button>
        </nav>

        <section id="display-area" class="content-grid">
            <div class="empty-state">VERİ BEKLENİYOR...</div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
